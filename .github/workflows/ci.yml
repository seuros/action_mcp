name: CI

on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-javascript:
    name: Tests (vite-plugin-action-mcp)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: javascript/vite-plugin-action-mcp
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

  test-postgresql:
    name: Tests (PostgreSQL, Ruby ${{ matrix.ruby-version }}, Rails ${{ matrix.rails-version }})
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.rails-version == 'dev' }}

    strategy:
      fail-fast: false
      matrix:
        ruby-version: ["3.4.8", "4.0.0"]
        rails-version: ["~> 8.1.1", "dev"]

    env:
      RAILS_ENV: test
      DATABASE_URL: postgresql://ubuntu:password@localhost/actionmcp_test
      RAILS_VERSION: ${{ matrix.rails-version }}

    services:
      db:
        image: "ghcr.io/seuros/postgis-with-extensions:18"
        env:
          POSTGRES_USER: ubuntu
          POSTGRES_PASSWORD: password
        ports:
          - "5432:5432"
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true

      - name: Create and migrate test database
        run: |
          cd test/dummy
          bin/rails db:create
          bin/rails action_mcp:install:migrations
          bin/rails db:migrate

      - name: Run tests
        run: bin/rails test

      - name: Run API-only host regression (edge only)
        if: matrix.rails-version == 'dev'
        env:
          ACTION_MCP_API_ONLY: "1"
        run: bin/rails test test/action_mcp/render_ui_api_only_test.rb

  test-sqlite3:
    name: Tests (SQLite3, Ruby ${{ matrix.ruby-version }}, Rails ${{ matrix.rails-version }})
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.rails-version == 'dev' }}

    strategy:
      fail-fast: false
      matrix:
        ruby-version: ["3.4.8", "4.0.0"]
        rails-version: ["~> 8.1.1", "dev"]

    env:
      RAILS_ENV: test
      DATABASE_URL: sqlite3:tmp/test.sqlite3
      RAILS_VERSION: ${{ matrix.rails-version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true

      - name: Create and migrate test database
        run: |
          cd test/dummy
          bin/rails db:create
          bin/rails action_mcp:install:migrations
          bin/rails db:migrate

      - name: Run tests
        run: bin/rails test

      - name: Run API-only host regression (edge only)
        if: matrix.rails-version == 'dev'
        env:
          ACTION_MCP_API_ONLY: "1"
        run: bin/rails test test/action_mcp/render_ui_api_only_test.rb
